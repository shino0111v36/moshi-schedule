<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>大学受験 模試日程ガイド</title>
  <style>
    :root {
      --toshin: #e74c3c; --toshin-light: #fdecea;
      --kawai:  #2980b9; --kawai-light:  #eaf4fb;
      --sundai: #27ae60; --sundai-light: #eafaf1;
      --other:  #8e44ad; --other-light:  #f5eef8;
      --todai:  #c0392b;
      --nankan: #d35400;
      --kyotsu: #1a5276;
      --bg: #f4f6f8; --card: #fff; --text: #2c3e50;
      --text-sub: #7f8c8d; --border: #e0e6ed; --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Hiragino Sans','Yu Gothic UI','Meiryo',sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* HEADER */
    header { background: linear-gradient(135deg,#1a2a4a,#2c4a7c); color: #fff; padding: 24px 32px 20px; box-shadow: 0 4px 20px rgba(0,0,0,.15); }
    header h1 { font-size: 1.7rem; font-weight: 700; letter-spacing: .03em; }
    .header-sub { margin-top: 6px; font-size: .82rem; opacity: .7; display: flex; flex-wrap: wrap; gap: 12px; }

    /* CONTAINER */
    .container { max-width: 1200px; margin: 0 auto; padding: 22px 20px; }

    /* DISCLAIMER */
    .disclaimer { background: #fef9e7; border: 1px solid #f9ca24; border-radius: 8px; padding: 11px 15px; font-size: .81rem; color: #7d6608; margin-bottom: 18px; display: flex; gap: 8px; }

    /* LEGEND */
    .legend-row { display: flex; flex-wrap: wrap; gap: 8px 18px; margin-bottom: 18px; align-items: center; }
    .legend-sep { color: var(--border); font-size: 1.2rem; }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: .82rem; }
    .legend-dot { width: 13px; height: 13px; border-radius: 3px; flex-shrink: 0; }

    /* FILTER BAR */
    .filter-bar { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; margin-bottom: 18px; display: flex; flex-wrap: wrap; gap: 16px; }
    .filter-group { display: flex; flex-direction: column; gap: 6px; }
    .filter-group label { font-size: .76rem; font-weight: 700; color: var(--text-sub); text-transform: uppercase; letter-spacing: .06em; }
    .btn-group { display: flex; flex-wrap: wrap; gap: 5px; }
    .filter-btn { border: 1.5px solid var(--border); background: #fff; color: var(--text); padding: 5px 13px; border-radius: 20px; font-size: .82rem; cursor: pointer; transition: all .18s; font-family: inherit; }
    .filter-btn:hover { background: var(--bg); }
    .filter-btn.active-all    { background: #2c4a7c; color: #fff; border-color: #2c4a7c; }
    .filter-btn.active-toshin { background: var(--toshin); color: #fff; border-color: var(--toshin); }
    .filter-btn.active-kawai  { background: var(--kawai);  color: #fff; border-color: var(--kawai); }
    .filter-btn.active-sundai { background: var(--sundai); color: #fff; border-color: var(--sundai); }
    .filter-btn.active-other  { background: var(--other);  color: #fff; border-color: var(--other); }
    .filter-btn.active-todai  { background: var(--todai);  color: #fff; border-color: var(--todai); }
    .filter-btn.active-nankan { background: var(--nankan); color: #fff; border-color: var(--nankan); }
    .filter-btn.active-kyotsu { background: var(--kyotsu); color: #fff; border-color: var(--kyotsu); }
    .filter-btn.active-g1     { background: #16a085; color: #fff; border-color: #16a085; }
    .filter-btn.active-g2     { background: #8e44ad; color: #fff; border-color: #8e44ad; }
    .filter-btn.active-g3     { background: #c0392b; color: #fff; border-color: #c0392b; }
    .filter-btn.active-ronin  { background: #555;    color: #fff; border-color: #555; }

    /* STATS */
    .stats-row { display: flex; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; }
    .stat-card { background: #fff; border: 1px solid var(--border); border-radius: 10px; padding: 12px 18px; flex: 1; min-width: 110px; text-align: center; }
    .stat-card .num { font-size: 1.7rem; font-weight: 700; color: #2c4a7c; }
    .stat-card .lbl { font-size: .76rem; color: var(--text-sub); margin-top: 1px; }

    /* CALENDAR */
    .month-block { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 14px; overflow: hidden; }
    .month-header { background: linear-gradient(135deg,#2c4a7c,#1a2a4a); color: #fff; padding: 11px 18px; font-size: .95rem; font-weight: 700; display: flex; justify-content: space-between; align-items: center; }
    .count-badge { background: rgba(255,255,255,.22); border-radius: 12px; padding: 2px 10px; font-size: .77rem; }
    .exam-row { display: flex; align-items: stretch; border-bottom: 1px solid var(--border); transition: background .14s; }
    .exam-row:last-child { border-bottom: none; }
    .exam-row:hover { background: #f8fafc; }
    .school-bar { width: 6px; flex-shrink: 0; }
    .school-bar.toshin { background: var(--toshin); }
    .school-bar.kawai  { background: var(--kawai); }
    .school-bar.sundai { background: var(--sundai); }
    .school-bar.other  { background: var(--other); }
    .exam-content { flex: 1; padding: 12px 15px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .exam-date { font-size: .92rem; font-weight: 700; min-width: 78px; }
    .exam-name { flex: 1; min-width: 150px; font-size: .88rem; }
    .school-tag { font-size: .73rem; font-weight: 700; padding: 3px 9px; border-radius: 11px; white-space: nowrap; }
    .school-tag.toshin { background: var(--toshin-light); color: var(--toshin); }
    .school-tag.kawai  { background: var(--kawai-light);  color: var(--kawai); }
    .school-tag.sundai { background: var(--sundai-light); color: var(--sundai); }
    .school-tag.other  { background: var(--other-light);  color: var(--other); }
    .type-tag { font-size: .7rem; font-weight: 700; padding: 2px 8px; border-radius: 9px; white-space: nowrap; }
    .type-tag.todai  { background: #fadbd8; color: var(--todai); }
    .type-tag.nankan { background: #fdebd0; color: var(--nankan); }
    .type-tag.kyotsu { background: #d6eaf8; color: var(--kyotsu); }
    .grade-tags { display: flex; gap: 3px; flex-wrap: wrap; }
    .grade-tag { font-size: .68rem; font-weight: 600; padding: 2px 7px; border-radius: 8px; white-space: nowrap; }
    .grade-tag.g1    { background: #d1f2eb; color: #148f77; }
    .grade-tag.g2    { background: #e8daef; color: #7d3c98; }
    .grade-tag.g3    { background: #fde8e8; color: #c0392b; }
    .grade-tag.ronin { background: #eaecee; color: #555; }
    .apply-btn { display: inline-block; background: #2c4a7c; color: #fff; padding: 5px 13px; border-radius: 6px; font-size: .76rem; text-decoration: none; white-space: nowrap; transition: background .18s; }
    .apply-btn:hover { background: #1a2a4a; }

    .no-results { text-align: center; padding: 44px; color: var(--text-sub); font-size: .92rem; }
    .result-bar { text-align: right; margin-bottom: 12px; font-size: .83rem; color: var(--text-sub); }
  </style>
</head>

<header>

    <span class="legend-item"><span class="legend-dot" style="background:#eaecee"></span>既卒</span>
  </div>

  <!-- フィルター -->
  <div class="filter-bar">
    <div class="filter-group">
      <label>塾</label>
      <div class="btn-group" id="schoolBtns">
        <button class="filter-btn active-all" onclick="setFilter('school','all',this)">すべて</button>

        <button class="filter-btn" onclick="setFilter('school','kawai',this)">河合塾</button>
        <button class="filter-btn" onclick="setFilter('school','sundai',this)">駿台</button>
        <button class="filter-btn" onclick="setFilter('school','other',this)">その他</button>
      </div>
    </div>
    <div class="filter-group">
      <label>種別</label>
      <div class="btn-group" id="typeBtns">
        <button class="filter-btn active-all" onclick="setFilter('type','all',this)">すべて</button>
        <button class="filter-btn" onclick="setFilter('type','todai',this)">東大模試</button>
        <button class="filter-btn" onclick="setFilter('type','nankan',this)">難関大模試</button>
        <button class="filter-btn" onclick="setFilter('type','kyotsu',this)">共通テスト模試</button>
      </div>
    </div>
    <div class="filter-group">
      <label>受験学年</label>
      <div class="btn-group" id="gradeBtns">
        <button class="filter-btn active-all" onclick="setFilter('grade','all',this)">すべて</button>
        <button class="filter-btn" onclick="setFilter('grade','g1',this)">高1</button>

        <button class="filter-btn" onclick="setFilter('grade','g3',this)">高3</button>
        <button class="filter-btn" onclick="setFilter('grade','ronin',this)">既卒・浪人</button>
      </div>
    </div>
  </div>

  <!-- 統計 -->
  <div class="stats-row">
    <div class="stat-card"><div class="num" id="stTotal">0</div><div class="lbl">全模試数</div></div>
    <div class="stat-card"><div class="num" id="stToshin" style="color:var(--toshin)">0</div><div class="lbl">東進</div></div>
    <div class="stat-card"><div class="num" id="stKawai"  style="color:var(--kawai)">0</div><div class="lbl">河合塾</div></div>
    <div class="stat-card"><div class="num" id="stSundai" style="color:var(--sundai)">0</div><div class="lbl">駿台</div></div>
  </div>

  <div class="result-bar"><span id="resultCount"></span></div>

  <!-- カレンダービュー -->
  <div id="calendarView"></div>

</div><!-- /container -->

// ===== 定数 =====
const schoolNames = { toshin:'東進', kawai:'河合塾', sundai:'駿台', other:'その他' };
const typeNames   = { todai:'東大模試', nankan:'難関大模試', kyotsu:'共通テスト模試' };
const gradeNames  = { g1:'高1', g2:'高2', g3:'高3', ronin:'既卒' };
const weekdays    = ['日','月','火','水','木','金','土'];

// ===== 表示ウィンドウ（LAST_UPDATED 以降・全件）=====
function getWindow() {
  const from = new Date(LAST_UPDATED + 'T00:00:00');
  const maxDate = allExams.reduce((max, e) => e.date > max ? e.date : max, LAST_UPDATED);
  const to = new Date(maxDate + 'T00:00:00');
  return { from, to };
}

function getMonthKeys() {
  const { from, to } = getWindow();
  const list = [];
  const cur = new Date(from.getFullYear(), from.getMonth(), 1);
  while (cur <= to) {
    const y = cur.getFullYear();
    const m = cur.getMonth() + 1;
    list.push({
      key:   `${y}-${String(m).padStart(2,'0')}`,
      label: `${y}年${m}月`
    });
    cur.setMonth(cur.getMonth() + 1);
  }
  return list;
}

// ===== STATE =====
let filterSchool = 'all';
let filterType   = 'all';
let filterGrade  = 'all';

// ===== フィルター =====
function setFilter(kind, val, btn) {
  if (kind==='school') { filterSchool=val; updateBtns('schoolBtns', val); }
  if (kind==='type')   { filterType=val;   updateBtns('typeBtns',   val); }
  if (kind==='grade')  { filterGrade=val;  updateBtns('gradeBtns',  val); }
  render();
}

function updateBtns(groupId, active) {
  document.querySelectorAll(`#${groupId} .filter-btn`).forEach(b => { b.className='filter-btn'; });
  const clicked = document.querySelector(`#${groupId} .filter-btn[onclick*="'${active}'"]`);
  if (clicked) clicked.className = `filter-btn active-${active}`;
}

// ===== データ取得（LAST_UPDATED 以降＋フィルター）=====
function getFiltered() {
  return allExams.filter(e => {
    if (e.date < LAST_UPDATED) return false;
    if (filterSchool!=='all' && e.school!==filterSchool) return false;
    if (filterType  !=='all' && e.type  !==filterType  ) return false;
    if (filterGrade !=='all' && !e.grades.includes(filterGrade)) return false;
    return true;
  }).sort((a,b) => a.date.localeCompare(b.date));
}

// ===== 日付フォーマット =====
function fmtDate(ds) {
  const d = new Date(ds+'T00:00:00');
  const w = weekdays[d.getDay()];
  return `${d.getMonth()+1}/${d.getDate()}(${w})`;
}

// ===== 学年タグ =====
function gradeTagsHtml(grades) {
  return `<div class="grade-tags">${grades.map(g=>`<span class="grade-tag ${g}">${gradeNames[g]}</span>`).join('')}</div>`;
}

// ===== 統計 =====
function updateStats(data) {
  document.getElementById('stTotal').textContent  = data.length;
  document.getElementById('stToshin').textContent = data.filter(e=>e.school==='toshin').length;
  document.getElementById('stKawai').textContent  = data.filter(e=>e.school==='kawai').length;
  document.getElementById('stSundai').textContent = data.filter(e=>e.school==='sundai').length;
  document.getElementById('resultCount').textContent = `${data.length}件を表示中`;
}

// ===== カレンダー描画 =====
function renderCalendar(data) {
  const months = getMonthKeys();
  const cv = document.getElementById('calendarView');
  let html = '';
  let total = 0;
  for (const m of months) {
    const items = data.filter(e => e.date.startsWith(m.key));
    if (!items.length) continue;
    total += items.length;
    html += `<div class="month-block">
      <div class="month-header"><span>${m.label}</span><span class="count-badge">${items.length}件</span></div>
      <div class="month-body">`;
    for (const e of items) {
      html += `<div class="exam-row">
        <div class="school-bar ${e.school}"></div>
        <div class="exam-content">
          <span class="exam-date">${fmtDate(e.date)}</span>
          <span class="exam-name">${e.name}</span>
          <span class="school-tag ${e.school}">${schoolNames[e.school]}</span>
          <span class="type-tag ${e.type}">${typeNames[e.type]}</span>
          ${gradeTagsHtml(e.grades)}
          <a class="apply-btn" href="${e.url}" target="_blank" rel="noopener">詳細・申込 →</a>
        </div>
      </div>`;
    }
    html += `</div></div>`;
  }
  if (!total) html = `<div class="no-results">条件に合う模試が見つかりませんでした。</div>`;
  cv.innerHTML = html;
}

// ===== ヘッダーに最終更新日を表示 =====
function updateHeaderWindow() {
  const d = new Date(LAST_UPDATED + 'T00:00:00');
  document.getElementById('headerWindow').textContent =
    `最終更新：${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
}

// ===== メイン描画 =====
function render() {
  const data = getFiltered();
  updateStats(data);
  renderCalendar(data);
}

// ===== 初期化 =====
updateHeaderWindow();
render();
</script>
